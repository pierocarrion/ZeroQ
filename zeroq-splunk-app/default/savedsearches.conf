[ZeroQ Critical Findings Daily]
search = | index=crypto_source sourcetype=zeroq:crypto_finding earliest=-24h sev=critical | stats count by repo, file, kind | where count > 0
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert.track = 1
alert.severity = high
alert.suppress = 0
alert.digest_mode = True
alert.condition = search count > 0
alert.actions = email
cron_schedule = 0 9 * * *

[ZeroQ Certificates Expiring < 30d]
search = | index=crypto_pki sourcetype=zeroq:cert | where expiry < 30 | table subject, expiry, issuer, urgency
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert.track = 1
alert.severity = high
alert.suppress = 0
alert.digest_mode = True
alert.condition = search expiry < 30
alert.actions = email
cron_schedule = 0 9 * * *

[ZeroQ HNDL Anomaly Detected]
search = | index=crypto_hndl sourcetype=zeroq:hndl_event status=active | stats count by dst, geo, deviation | where count > 0
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert.track = 1
alert.severity = high
alert.suppress = 0
alert.digest_mode = True
alert.condition = search count > 0
alert.actions = email
cron_schedule = */15 * * * *
