[cam:crypto_finding]
SHOULD_LINEMERGE = false
TIME_PREFIX = "time":
TIME_FORMAT = %s.%3N
KV_MODE = json
EVAL-sev = lower(sev)
EVAL-risk = case(sev="critical","critical",sev="high","high",1=1,"monitor")

[cam:tls_connection]
SHOULD_LINEMERGE = false
TIME_PREFIX = "time":
TIME_FORMAT = %s.%3N
KV_MODE = json
EVAL-risk = lower(risk)

[cam:cert]
SHOULD_LINEMERGE = false
TIME_PREFIX = "time":
TIME_FORMAT = %s.%3N
KV_MODE = json
EVAL-urgency = lower(urgency)

[cam:hndl_event]
SHOULD_LINEMERGE = false
TIME_PREFIX = "time":
TIME_FORMAT = %s.%3N
KV_MODE = json
EVAL-status = lower(status)

[cam:plan]
SHOULD_LINEMERGE = false
TIME_PREFIX = "time":
TIME_FORMAT = %s.%3N
KV_MODE = json
